<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="radarGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="200" height="200" rx="32" fill="#0a0f1a"/>

  <!-- Radar Icon -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#radarGlow)" stroke-width="5" opacity="0.6"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#radarGlow)" stroke-width="4.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#radarGlow)" stroke-width="4" opacity="1"/>
    <circle cx="0" cy="0" r="12" fill="#22c55e"/>
    <line x1="0" y1="0" x2="58" y2="-38" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <circle cx="45" cy="-29" r="6" fill="#22c55e" opacity="0.8"/>
  </g>
