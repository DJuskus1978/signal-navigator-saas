<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="radarGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="0" fill="#0a0f1a"/>

  <!-- Radar Icon -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="65" fill="none" stroke="url(#radarGlow)" stroke-width="4.5" opacity="0.7"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#radarGlow)" stroke-width="4" opacity="0.85"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="url(#radarGlow)" stroke-width="3.5" opacity="1"/>
    <circle cx="0" cy="0" r="10" fill="#2563eb"/>
    <line x1="0" y1="0" x2="55" y2="-35" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <circle cx="42" cy="-27" r="5" fill="#2563eb" opacity="0.8"/>
  </g>

  <!-- Brand Text -->
  <text x="200" y="115" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="64" fill="#ffffff" letter-spacing="-1">
    Stocks<tspan fill="#2563eb">Radars</tspan>
  </text>
</svg>